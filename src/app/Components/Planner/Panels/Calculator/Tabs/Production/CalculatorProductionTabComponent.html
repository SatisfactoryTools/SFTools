<div class="p-2">
	<table class="table table-dark table-sm align-middle mb-2">
		<thead>
			<tr>
				<th>Item</th>
				<th style="width: 205px;">Rate</th>
				<th style="width: 36px;"></th>
			</tr>
		</thead>
		<tbody>
			@for (row of rows; track $index; let i = $index) {
				<tr>
					<td>
						<item-picker
							[options]="itemOptions"
							[value]="row.itemClassName"
							placeholder="- select item -"
							(valueChange)="onItemChange(row, $event)"
						></item-picker>
					</td>
					<td>
						<div class="input-group input-group-sm">
							<input
								type="number"
								class="form-control form-control-sm bg-dark text-light border-secondary"
								[name]="'rate-' + i"
								[(ngModel)]="row.ratePerMinute"
								(ngModelChange)="sync()"
								min="0"
								step="1"
							>
							<span class="input-group-text bg-dark text-secondary border-secondary">{{ rateUnit(row.itemClassName) }}</span>
						</div>
					</td>
					<td>
						<button
							class="btn btn-sm btn-outline-danger px-2"
							type="button"
							(click)="removeRow(i)"
						><fa-icon [icon]="faXmark"></fa-icon></button>
					</td>
				</tr>
			}
		</tbody>
	</table>

	<button class="btn btn-sm btn-outline-success w-100" type="button" (click)="addRow()">
		+ Add Item
	</button>
</div>
