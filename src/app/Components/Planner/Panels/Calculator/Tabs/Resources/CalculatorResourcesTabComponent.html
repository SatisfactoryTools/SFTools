<div class="p-2">
	<table class="table table-dark table-sm align-middle mb-0">
		<thead>
			<tr>
				<th>Raw resource</th>
				<th style="width: 220px;">Limit</th>
				<th style="width: 110px;">Infinite</th>
			</tr>
		</thead>
		<tbody>
			@for (row of rows; track row.className) {
				<tr>
					<td>
						<span class="d-inline-flex align-items-center gap-2">
							<game-icon [hash]="iconHash(row.className)" [size]="20" [alt]="row.name"></game-icon>
							{{ row.name }}
						</span>
					</td>
					<td>
						<div class="input-group input-group-sm">
							<input
								type="number"
								class="form-control form-control-sm bg-dark text-light border-secondary"
								[name]="'limit-' + row.className"
								[(ngModel)]="row.limit"
								(ngModelChange)="sync()"
								[disabled]="row.infinite"
								min="0"
								step="1"
							>
							<span class="input-group-text bg-dark text-secondary border-secondary">{{ rateUnit(row.className) }}</span>
						</div>
					</td>
					<td>
						<div class="form-check">
							<input
								class="form-check-input"
								type="checkbox"
								[id]="'infinite-' + row.className"
								[name]="'infinite-' + row.className"
								[(ngModel)]="row.infinite"
								(ngModelChange)="sync()"
							/>
						</div>
					</td>
				</tr>
			}
		</tbody>
	</table>
</div>
