<div class="p-2 d-flex flex-column gap-3" style="max-width: 680px;">

	<div class="d-flex align-items-center gap-2">
		<label class="form-label mb-0 text-nowrap" for="default-clock-speed">Default clock speed</label>
		<clock-speed-input
			inputId="default-clock-speed"
			[value]="defaultClockSpeed"
			(valueChange)="setDefaultClockSpeed($event)"
		></clock-speed-input>
	</div>
	<div class="text-secondary">
		Every machine the solver builds runs at this clock speed (in percent, 1–250),
		unless its recipe has an override below. Power shards needed for overclocked
		machines show in the status bar after calculating.
	</div>

	<div>
		<table class="table table-dark table-sm align-middle mb-2">
			<thead>
				<tr>
					<th>Recipe</th>
					<th style="width: 260px;">Clock speed</th>
					<th style="width: 36px;"></th>
				</tr>
			</thead>
			<tbody>
				@for (row of rows; track $index; let i = $index) {
					<tr>
						<td>
							<item-picker
								[options]="recipeOptions"
								[value]="row.recipeClassName"
								placeholder="- select recipe -"
								(valueChange)="onRecipeChange(row, $event)"
							></item-picker>
						</td>
						<td>
							<clock-speed-input
								[value]="row.clockSpeed"
								(valueChange)="onClockChange(row, $event)"
							></clock-speed-input>
						</td>
						<td>
							<button
								class="btn btn-sm btn-outline-danger px-2"
								type="button"
								(click)="removeRow(i)"
							><fa-icon [icon]="faXmark"></fa-icon></button>
						</td>
					</tr>
				}
			</tbody>
		</table>

		<button class="btn btn-sm btn-outline-success w-100" type="button" (click)="addRow()">
			+ Add recipe
		</button>
	</div>

</div>
