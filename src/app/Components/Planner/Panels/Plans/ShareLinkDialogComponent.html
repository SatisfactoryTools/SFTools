<div class="share-backdrop" (click)="close.emit()">
	<div class="share-dialog card bg-dark border-secondary" (click)="$event.stopPropagation()">
		<div class="card-header d-flex align-items-center gap-2">
			<span class="fw-semibold flex-grow-1 text-truncate">Share &ldquo;{{ subjectName }}&rdquo;</span>
			<button type="button" class="btn-close btn-close-white" aria-label="Close" (click)="close.emit()"></button>
		</div>
		<div class="card-body d-flex flex-column gap-2">
			<div class="text-secondary small">
				Anyone with this link can view a frozen snapshot and copy it into their own plans.
				Later changes to the originals will not affect the share.
			</div>
			<div class="d-flex gap-2">
				<input type="text" class="form-control form-control-sm bg-dark text-light border-secondary" readonly [value]="link" (focus)="$any($event.target).select()"/>
				<button type="button" class="btn btn-sm flex-shrink-0" [class.btn-outline-primary]="!copied" [class.btn-success]="copied" (click)="copy()">
					<fa-icon [icon]="copied ? faCheck : faCopy"></fa-icon>
					{{ copied ? 'Copied' : 'Copy' }}
				</button>
			</div>
		</div>
	</div>
</div>
