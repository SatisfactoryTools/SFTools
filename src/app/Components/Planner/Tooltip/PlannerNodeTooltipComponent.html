@if (tooltip.content(); as content) {
	<div
		class="shadow"
		style="position: fixed; z-index: 1060; pointer-events: none; max-width: 320px;
		       background: #141c28; border: 1px solid #2e3d52; border-radius: 4px;
		       padding: 6px 10px; font-size: 0.875rem; color: #dde4ef;"
		[style.left.px]="left"
		[style.top.px]="top"
	>
		<div class="fw-bold mb-1" style="color: #e58a72;">{{ content.title }}</div>
		@for (line of content.lines; track line) {
			<div>{{ line }}</div>
		}
	</div>
}
