<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-6 col-lg-5">
			<h2 class="mb-4">Create account</h2>

			@if (success) {
				<div class="alert alert-success">
					Account created successfully. <a routerLink="/auth/login">Login now</a>
				</div>
			} @else {
				<p class="text-secondary">
					Signing in with a provider creates your account automatically - no form needed.
				</p>

				<oauth-provider-buttons verb="Sign up with" [includeSteam]="false"></oauth-provider-buttons>

				<hr class="border-secondary" />

				@if (!showClassicForm) {
					<button type="button" class="btn btn-sm btn-outline-secondary w-100" (click)="showClassicForm = true">
						Register with username &amp; password
					</button>
				} @else {
					@if (error) {
						<div class="alert alert-danger">{{ error }}</div>
					}

					<form (ngSubmit)="submit()">
						<div class="mb-3">
							<label class="form-label" for="login">Username</label>
							<input class="form-control" id="login" type="text" name="login" [(ngModel)]="login" required autocomplete="username">
						</div>
						<div class="mb-3">
							<label class="form-label" for="email">Email</label>
							<input class="form-control" id="email" type="email" name="email" [(ngModel)]="email" required autocomplete="email">
						</div>
						<div class="mb-3">
							<label class="form-label" for="password">Password</label>
							<input class="form-control" id="password" type="password" name="password" [(ngModel)]="password" required autocomplete="new-password" minlength="8">
							<div class="form-text">Minimum 8 characters.</div>
						</div>
						<button class="btn btn-outline-primary w-100" type="submit" [disabled]="loading">
							@if (loading) {
								<span class="spinner-border spinner-border-sm me-2" role="status"></span>
							}
							Register
						</button>
					</form>
				}

				<div class="mt-3 small">
					Already have an account? <a routerLink="/auth/login">Sign in</a>
				</div>
			}
		</div>
	</div>
</div>
