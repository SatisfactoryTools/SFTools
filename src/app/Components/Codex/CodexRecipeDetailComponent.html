@if (recipe(); as recipe) {
	<div class="container-fluid py-3">
		<a codexLink="recipes" class="btn btn-sm btn-outline-secondary mb-3"><fa-icon [icon]="faChevronLeft"></fa-icon> Recipes</a>

		<div class="d-flex align-items-center flex-wrap gap-2 mb-3">
			<h2 class="mb-0">{{ recipe.name }}</h2>
			@if (recipe.alternate) {
				<span class="badge bg-warning text-dark">Alternate</span>
			}
		</div>

		<codex-section heading="Recipe" [flush]="true">
			<codex-recipe-list [recipes]="[recipe]" [showNames]="false"/>
		</codex-section>

		@if (recipe.variablePowerDraw) {
			<codex-section heading="Details" [flush]="true">
				<table class="table table-sm">
					<tbody>
						<tr>
							<th class="text-muted fw-normal" style="width: 40%;">Variable power draw</th>
							<td>{{ variablePowerRange(recipe) }}</td>
						</tr>
					</tbody>
				</table>
			</codex-section>
		}

		@if (unlockedBy().length > 0) {
			<codex-section heading="Unlocked by" [flush]="true">
				<codex-schematic-list [schematics]="unlockedBy()"/>
			</codex-section>
		}
	</div>
} @else {
	<div class="container-fluid py-3">
		<p class="text-muted">Recipe not found.</p>
		<a codexLink="recipes" class="btn btn-sm btn-outline-secondary"><fa-icon [icon]="faChevronLeft"></fa-icon> Recipes</a>
	</div>
}
