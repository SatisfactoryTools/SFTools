<div class="card">
	<div class="card-header">
		<h5 class="mb-0">Planner</h5>
	</div>
	<div class="card-body">
		<h6 class="mb-2">Panels</h6>
		<p class="text-secondary">
			Panel positions and sizes are remembered automatically as you arrange them.
			Resetting returns every planner panel to its default position and size.
		</p>
		<button type="button" class="btn btn-outline-danger" (click)="resetPanels()">
			Reset panel positions and sizes
		</button>
	</div>
</div>
