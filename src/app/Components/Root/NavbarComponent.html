<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
	<div class="container-fluid">
		@if (versionManager.activeVersion() !== null) {
			<span class="navbar-brand d-flex align-items-center py-0">
				<img src="/assets/satisfactory.png" alt="Satisfactory" height="40" class="d-none d-md-block me-2">
				<img src="/assets/tools.png" alt="Tools" height="40">
			</span>
		} @else {
			<a class="navbar-brand d-flex align-items-center py-0" routerLink="/">
				<img src="/assets/satisfactory.png" alt="Satisfactory" height="40" class="d-none d-md-block me-2">
				<img src="/assets/tools.png" alt="Tools" height="40">
			</a>
		}

		<button class="navbar-toggler" type="button" (click)="collapsed = !collapsed">
			<span class="navbar-toggler-icon"></span>
		</button>

		<div class="collapse navbar-collapse" [collapse]="collapsed" [isAnimated]="true">
			@if (versionManager.activeVersion() !== null) {
				<ul class="navbar-nav mb-2 mb-lg-0">
					<version-switcher/>
					@if (backToPlannerLink(); as plannerLink) {
						<li class="nav-item">
							<a class="nav-link" [routerLink]="plannerLink">
								<fa-icon [icon]="faDiagramProject"></fa-icon>
								Back to planner
							</a>
						</li>
					}
				</ul>
				<navbar-search class="my-2 my-lg-0"/>
			} @else if (backToPlannerLink(); as plannerLink) {
				<ul class="navbar-nav mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" [routerLink]="plannerLink">
							<fa-icon [icon]="faDiagramProject"></fa-icon>
							Back to planner
						</a>
					</li>
				</ul>
			}
			<ul class="navbar-nav ms-auto mb-2 mb-lg-0">
				<li class="nav-item">
					<a class="nav-link" routerLink="/settings" routerLinkActive="active">
						<fa-icon [icon]="faGear"></fa-icon>
						Settings
					</a>
				</li>
				<navbar-user-dropdown/>
			</ul>
		</div>
	</div>
</nav>
